services:
  surfpool:
    # Pinned by digest (not :latest) so upstream image updates can't silently break local dev / CI — bump deliberately when needed.
    image: surfpool/surfpool@sha256:4f7b64daa96ab42d8a0d46cd0de556b1c90386f56fd66cfdefcb5f7039fdec9f
    command: ["start", "--no-tui"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf -X POST -H ''Content-Type: application/json'' -d ''{"jsonrpc":"2.0","id":1,"method":"getHealth"}'' http://localhost:8899 || exit 1',
        ]
      interval: 2s
      timeout: 2s
      retries: 30

  program-deploy:
    build:
      context: .
      dockerfile: docker/local/Dockerfile.anchor
    # Forced to amd64: Solana/Anchor publish no linux/arm64 prebuilt
    # binaries — see docker/local/Dockerfile.anchor and docker-compose.yml
    # for detail (same reasoning carried forward from Task 9).
    platform: linux/amd64
    depends_on:
      surfpool:
        condition: service_healthy
    environment:
      ANCHOR_PROVIDER_URL: http://surfpool:8899
    # Dockerfile.anchor's ENTRYPOINT (scripts/deploy-local.sh) exits 0 as
    # soon as deploy/codegen finishes — correct for docker-compose.yml's dev
    # loop, where nothing else races that exit. Here, the required
    # verification command (`up --build --abort-on-container-exit
    # --exit-code-from e2e`, no positional service args — same command
    # Task 11's CircleCI `e2e` job runs) treats every service as "explicit",
    # and --abort-on-container-exit aborts the WHOLE stack the instant ANY
    # explicit container exits — even a one-shot dependency container that
    # exited 0 on purpose. This is a documented Compose limitation, not an
    # application bug (see docker/compose#10233, #13223): confirmed
    # empirically in this task — an earlier attempt with the unmodified
    # exit-on-completion entrypoint reproducibly tore down surfpool
    # mid-flight the moment program-deploy exited, well before frontend/e2e
    # finished, failing frontend with "getaddrinfo ENOTFOUND surfpool". Fix:
    # never let this container exit during the run — run the entrypoint
    # script for the normal build/deploy/codegen work, then block forever on
    # `tail -f /dev/null` and signal completion via a marker file +
    # healthcheck instead of Compose's exit-based service_completed_successfully.
    #
    # `entrypoint:` must be overridden too, not just `command:` — Compose
    # appends `command:` as argv to whatever ENTRYPOINT the image declares
    # (here, scripts/deploy-local.sh, which ignores extra args), it does NOT
    # replace ENTRYPOINT. Resetting entrypoint to a shell makes command: run
    # as an actual shell command again.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        scripts/deploy-local.sh &&
        touch /tmp/deploy-complete && tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/deploy-complete"]
      interval: 5s
      timeout: 2s
      retries: 120
      start_period: 5s
    volumes:
      - .:/workspace
      # Named volumes isolate container-only node_modules from the host's
      # (macOS/arm64) bind-mounted node_modules — same reasoning as
      # docker-compose.yml's program-deploy service. Only this service
      # needs it here: `frontend` and `e2e` below are proper multi-stage
      # COPY-based image builds (docker/deployment/Dockerfile,
      # docker/local/Dockerfile.e2e), not bind mounts, so they never touch
      # host node_modules.
      - e2e_node_modules:/workspace/node_modules
      - e2e_frontend_node_modules:/workspace/apps/frontend/node_modules
      - e2e_on_chain_program_e2e_node_modules:/workspace/apps/on-chain-program-e2e/node_modules
      - e2e_e2e_node_modules:/workspace/apps/e2e/node_modules
      - e2e_on_chain_client_node_modules:/workspace/apps/on-chain-client/node_modules

  frontend:
    build:
      context: .
      dockerfile: docker/deployment/Dockerfile
    depends_on:
      program-deploy:
        condition: service_healthy
    environment:
      SOLANA_CLUSTER: localnet
      SOLANA_RPC_URL: http://surfpool:8899
      # Fixed local-dev program deploy identity — matches the throwaway
      # keypair committed at docker/local/fixtures/game_token_wallet-keypair.dev.json
      # (see the README alongside it) and docker-compose.yml's PROGRAM_ID.
      PROGRAM_ID: "FHRNx4KK4WzMxXx7X6sK84RvKTKuDVtTGduW3eH9QN9t"
      SYSTEM_ADMIN_SECRET_KEY: "PzfkD238UH1WRMoQZpt9uJpJda2eLJYtv7Bi7qscpjWH3E1Fjm2odmcSu1XDz1FTz2yZfBWfYBYU4arQzFNNmis"
    # Not in the plan's original compose text — added because `e2e` would
    # otherwise race `next start`'s boot time (no webServer wait built into
    # Playwright's config here). The runner image (bookworm-slim) has no
    # curl/wget, so the healthcheck uses a plain Node TCP probe instead of
    # adding an extra apt-get layer.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''net'').createConnection(3000,''127.0.0.1'').on(''connect'',()=>process.exit(0)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  e2e:
    build:
      context: .
      dockerfile: docker/local/Dockerfile.e2e
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      E2E_BASE_URL: http://frontend:3000

  on-chain-program-e2e:
    build:
      context: .
      dockerfile: docker/local/Dockerfile.on-chain-program-e2e
    depends_on:
      program-deploy:
        condition: service_healthy
    environment:
      SOLANA_RPC_URL: http://surfpool:8899
      SOLANA_RPC_WS_URL: ws://surfpool:8900
    # Same Compose limitation as program-deploy above (docker/compose#10233,
    # #13223): --abort-on-container-exit tears down the whole stack the
    # instant this container's Dockerfile CMD ("pnpm test") exits 0 on its
    # own — which happened before the e2e service's frontend healthcheck
    # cleared, silently preventing admin-registry.spec.ts/noop.spec.ts from
    # ever running. Fix: never let this container exit during the run — run
    # the real test command, then block forever on `tail -f /dev/null` and
    # signal completion via a marker file + healthcheck instead of
    # Compose's exit-based service_completed_successfully. The `&&` chain
    # must short-circuit on test failure (no `|| true`) so a genuine test
    # failure still exits non-zero immediately.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        pnpm test &&
        touch /tmp/test-complete && tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/test-complete"]
      interval: 5s
      timeout: 2s
      retries: 120
      start_period: 5s

volumes:
  e2e_node_modules:
  e2e_frontend_node_modules:
  e2e_on_chain_program_e2e_node_modules:
  e2e_e2e_node_modules:
  e2e_on_chain_client_node_modules:
